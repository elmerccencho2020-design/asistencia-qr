<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:20px;
font-size:28px;
}

#reader{
width:300px;
margin:auto;
border:5px solid #00ffd5;
border-radius:15px;
box-shadow:0px 0px 20px #00ffd5;
}

input{
padding:12px;
font-size:18px;
border-radius:8px;
border:none;
margin-top:15px;
width:200px;
text-align:center;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#00ffd5;
color:#000;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00c9a7;
}

#mensaje{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<div style="text-align:center;">
<img src="escudo.png" width="80">
</div>

<h2 style="text-align:center;">
INSTITUCIÓN EDUCATIVA JAVIER HERAUD PEREZ
</h2>

<div id="reader"></div>
  
<h2>ESCANER QR ESTUDIANTES JHP</h2>

<div id="reader"></div>

<br>

<h3>Registrar por DNI</h3>

<input id="dni" placeholder="Ingrese DNI">
<br><br>

<button onclick="registrarDNI()">Registrar</button>
<div id="mensaje"></div>
  
<br><br>

<h3 id="resultado">Esperando escaneo...</h3>

<script>

const API="https://script.google.com/macros/s/AKfycbypk3XZzFV1nu7wIQuy04ctXQMkg7qzYZiebGYghbVZ6G94qdk50yttuhB2sunX-ln1/exec";

let ultimoQR="";
let tiempoEscaneo=0;

function beep(){
let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
audio.play();
}

function registrar(dni){

fetch(API+"?dni="+dni)

.then(response=>response.text())

.then(data=>{

document.getElementById("resultado").innerHTML=data;

beep();

})

.catch(error=>{

document.getElementById("resultado").innerHTML="Error de conexión";

});

}

function registrarDNI(){

var dni = document.getElementById("dni").value;

if(dni==""){
alert("Ingrese DNI");
return;
}

fetch(API + "?dni=" + dni)
.then(response => response.text())
.then(data => {

document.getElementById("mensaje").innerHTML = data;

document.getElementById("dni").value = "";
document.getElementById("dni").focus();

});

}

function onScanSuccess(decodedText){

let ahora=Date.now();

if(decodedText==ultimoQR && (ahora-tiempoEscaneo)<5000){

document.getElementById("resultado").innerHTML="YA REGISTRADO";

return;

}

ultimoQR=decodedText;

tiempoEscaneo=ahora;

registrar(decodedText);

}

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
