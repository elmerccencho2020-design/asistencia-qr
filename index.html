<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

#reader{
width:300px;
margin:auto;
}

input{
padding:10px;
font-size:18px;
}

button{
padding:10px;
font-size:18px;
}

</style>

</head>

<body>

<h2>ESCANER QR ESTUDIANTES</h2>

<div id="reader"></div>

<br>

<h3>Registrar por DNI</h3>

<input id="dni" placeholder="Ingrese DNI">
<br><br>

<button onclick="registrarDNI()">Registrar</button>

<br><br>

<h3 id="resultado">Esperando escaneo...</h3>

<script>

const API="https://script.google.com/macros/s/AKfycbzJmkZgu3hpTlqsvFPeXY9m0NnLcE-8ZDxNQ15DjypPgzLo_o0koZoMkE68fhYwNBr6/exec";

let ultimoQR="";
let tiempoEscaneo=0;

function beep(){
let audio=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
audio.play();
}

function registrar(dni){

fetch(API+"?dni="+dni)

.then(response=>response.text())

.then(data=>{

document.getElementById("resultado").innerHTML=data;

beep();

})

.catch(error=>{

document.getElementById("resultado").innerHTML="Error de conexión";

});

}

function registrarDNI(){

let dni=document.getElementById("dni").value;

registrar(dni);

}

function onScanSuccess(decodedText){

let ahora=Date.now();

if(decodedText==ultimoQR && (ahora-tiempoEscaneo)<5000){

document.getElementById("resultado").innerHTML="YA REGISTRADO";

return;

}

ultimoQR=decodedText;

tiempoEscaneo=ahora;

registrar(decodedText);

}

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
