<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div style="text-align:center;">
<img src="escudo.png" width="80">
</div>

<h2 style="text-align:center;">
INSTITUCIÓN EDUCATIVA JAVIER HERAUD PEREZ
</h2>

<div id="reader"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbzJmkZgu3hpTlqsvFPeXY9m0NnLcE-8ZDxNQ15DjypPgzLo_o0koZoMkE68fhYwNBr6/exec";

function onScanSuccess(decodedText){

fetch(API,{
method:"POST",
body:JSON.stringify({dni:decodedText})
});

alert("Asistencia registrada: "+decodedText);

}

let scanner = new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

</script>

</body>

</html>
